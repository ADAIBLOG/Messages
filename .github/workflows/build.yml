name: Build and Test

on:
  workflow_dispatch:
  pull_request:
    branches:
      - master
  push:
    branches:
      - master

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Validate Gradle Wrapper
      uses: gradle/wrapper-validation-action@v1

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'
        cache: gradle

    - name: Build with Gradle
      run: ./gradlew assembleRelease

    - name: Run Android Lint
      run: ./gradlew lint

    - name: Run Tests
      run: ./gradlew test

    - name: List APK Output Directory
      run: ls -R presentation/build/outputs/apk || true

    - name: Rename APKs for clarity
      shell: bash
      run: |
        set -euo pipefail
        shopt -s nullglob
        
        # Create a directory for renamed APKs
        mkdir -p presentation/build/outputs/apk/renamed
        
        # Rename release APKs by ABI
        for apk in presentation/build/outputs/apk/release/*-release-*.apk; do
          if [[ -f "$apk" ]]; then
            # Extract information from filename
            filename=$(basename "$apk")
            # Expected format: org.prauga.messages-release-armeabi-v7a-1.0.2-3.apk
            if [[ $filename =~ ^org\.prauga\.messages-release-(.*)-(.*)-(.*)\.apk$ ]]; then
              abi=${BASH_REMATCH[1]}
              version=${BASH_REMATCH[2]}
              versionCode=${BASH_REMATCH[3]}
              new_filename="Messages-v${version}-${abi}.apk"
              echo "Renaming $filename to $new_filename"
              cp "$apk" "presentation/build/outputs/apk/renamed/$new_filename"
            else
              # Fallback if filename format is different
              new_filename="Messages-$(basename "$apk")"
              echo "Renaming $filename to $new_filename (fallback)"
              cp "$apk" "presentation/build/outputs/apk/renamed/$new_filename"
            fi
          fi
        done

    - name: Upload App
      uses: actions/upload-artifact@v4
      with:
        name: apks
        path: presentation/build/outputs/apk/renamed/*
